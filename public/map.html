<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

<script>
const RATINGS = {
  PRIME:        {label:'Prime',        emoji:'🎣', color:'#2e7d32', bg:'#e8f5e9', tagline:'Drop everything and go.'},
  FISHING_WELL: {label:'Fishing Well', emoji:'✅', color:'#558b2f', bg:'#f1f8e9', tagline:'Worth the drive.'},
  FAIR:         {label:'Fair',         emoji:'🟡', color:'#f9a825', bg:'#fffde7', tagline:'Fishable. Pick your spots.'},
  TOUGH:        {label:'Tough',        emoji:'🟠', color:'#e65100', bg:'#fff3e0', tagline:'Fish are off.'},
  BLOWN_OUT:    {label:'Blown Out',    emoji:'🔴', color:'#b71c1c', bg:'#ffebee', tagline:'Stay home.'},
};
const SCORE = {PRIME:5,FISHING_WELL:4,FAIR:3,TOUGH:2,BLOWN_OUT:1};
const SP_COLOR = {brook:'#1b5e20',brown:'#bf360c',rainbow:'#0d47a1',steelhead:'#6a1b9a'};
const SP_BG    = {brook:'#e8f5e9',brown:'#fff3e0',rainbow:'#e3f2fd',steelhead:'#f3e5f5'};
const SP_LABEL = {brook:'Brook',brown:'Brown',rainbow:'Rainbow',steelhead:'Steelhead'};

// Hardcoded river center coordinates — all verified
const RIVER_COORDS = {
  'ausable':              [44.655, -84.132],
  'manistee':             [44.580, -85.760],
  'pere-marquette':       [43.955, -86.230],
  'muskegon':             [43.398, -85.842],
  'boardman':             [44.789, -85.647],
  'jordan':               [45.159, -85.077],
  'pigeon':               [45.052, -84.569],
  'rifle-river':          [44.016, -84.026],
  'little-manistee':      [43.968, -86.189],
  'betsie-river':         [44.612, -86.062],
  'pine-river':           [44.210, -85.952],
  'platte-river':         [44.676, -86.148],
  'rogue-river':          [43.118, -85.541],
  'white-river':          [43.703, -86.362],
  'flat-river':           [43.047, -85.299],
  'looking-glass-river':  [42.850, -84.813],
  'sturgeon-river-nlp':   [45.278, -84.681],
  'thunder-bay-river':    [45.070, -83.753],
  'black-river-up':       [46.619, -90.068],
  'tahquamenon-river':    [46.537, -85.262],
  'paint-river':          [46.106, -88.309],
  'iron-river':           [46.094, -88.672],
  'brule-river':          [46.085, -88.452],
  'michigamme-river':     [46.018, -88.298],
  'au-train-river':       [46.462, -86.763],
  'ontonagon-river':      [46.771, -89.306],
  'presque-isle-river':   [46.691, -89.963],
  'sturgeon-river-up':    [46.529, -89.097],
  'salmon-trout-river':   [46.826, -87.948],
  'trap-rock-river':      [47.148, -88.386],
  'silver-river':         [46.793, -88.462],
  'black-river-schoolcraft': [46.127, -86.180],
  'miners-river':         [46.457, -86.528],
  'au-gres-river':        [44.032, -83.682],
  'pine-river-midland':   [43.617, -84.261],
  'little-muskegon-river':[43.620, -85.580],
  'clam-river':           [44.183, -85.415],
  'maple-river-lp':       [43.105, -84.697],
  'thornapple-river':     [42.668, -85.372],
};

const RIVER_SLUGS = {"ausable":"ausable-river","manistee":"manistee-river","pere-marquette":"pere-marquette-river","muskegon":"muskegon-river","boardman":"boardman-river","jordan":"jordan-river-michigan","pigeon":"pigeon-river-michigan","rifle-river":"rifle-river-michigan","little-manistee":"little-manistee-river","betsie-river":"betsie-river","pine-river":"pine-river-michigan","platte-river":"platte-river-michigan","rogue-river":"rogue-river-michigan","white-river":"white-river-michigan","flat-river":"flat-river-michigan","looking-glass-river":"looking-glass-river","sturgeon-river-nlp":"sturgeon-river-michigan","thunder-bay-river":"thunder-bay-river","black-river-up":"black-river-upper-peninsula","tahquamenon-river":"tahquamenon-river","paint-river":"paint-river-michigan","iron-river":"iron-river-michigan","brule-river":"brule-river-michigan","michigamme-river":"michigamme-river","au-train-river":"au-train-river","miners-river":"miners-river-michigan","salmon-trout-river":"salmon-trout-river","presque-isle-river":"presque-isle-river","trap-rock-river":"trap-rock-river","ontonagon-river":"ontonagon-river","sturgeon-river-up":"sturgeon-river-upper-peninsula","silver-river":"silver-river-michigan","black-river-schoolcraft":"black-river-schoolcraft-county","au-gres-river":"au-gres-river","pine-river-midland":"pine-river-midland-county","little-muskegon-river":"little-muskegon-river","clam-river":"clam-river-michigan","maple-river-lp":"maple-river-michigan","thornapple-river":"thornapple-river"};

let _map, _riverLayer, _accessLayer, _allPoints=[], _condMap={};
let _activeSp='all', _activeLayer='all';

// ── Map init ──────────────────────────────────────────────────────────────────
function initMap(){
  _map = L.map('map',{center:[44.8,-85.4],zoom:7,zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',maxZoom:18
  }).addTo(_map);

  // Legend
  const leg=L.control({position:'bottomright'});
  leg.onAdd=()=>{
    const d=L.DomUtil.create('div','map-legend');
    d.innerHTML=`<h4>River Conditions</h4>
      <div class="leg-row"><div class="leg-dot" style="background:#2e7d32"></div>Prime</div>
      <div class="leg-row"><div class="leg-dot" style="background:#558b2f"></div>Fishing Well</div>
      <div class="leg-row"><div class="leg-dot" style="background:#f9a825"></div>Fair</div>
      <div class="leg-row"><div class="leg-dot" style="background:#e65100"></div>Tough</div>
      <div class="leg-row"><div class="leg-dot" style="background:#b71c1c"></div>Blown Out</div>
      <div style="margin-top:7px;padding-top:6px;border-top:1px solid #eee">
        <h4>Access Points</h4>
        <div class="leg-row"><div class="leg-dot" style="background:#1b5e20"></div>Brook Trout</div>
        <div class="leg-row"><div class="leg-dot" style="background:#bf360c"></div>Brown Trout</div>
        <div class="leg-row"><div class="leg-dot" style="background:#0d47a1"></div>Rainbow</div>
        <div class="leg-row"><div class="leg-dot" style="background:#6a1b9a"></div>Steelhead</div>
      </div>`;
    return d;
  };
  leg.addTo(_map);
}

// ── Condition markers (river level, always visible) ───────────────────────────
function renderRiverMarkers(rivers){
  if(_riverLayer) _map.removeLayer(_riverLayer);
  _riverLayer = L.layerGroup();

  rivers.forEach(r=>{
    const coords=RIVER_COORDS[r.id];
    if(!coords)return;
    const c=r.conditions;
    const rat=c?.ratingKey?(RATINGS[c.ratingKey]||RATINGS.FAIR):RATINGS.FAIR;

    const icon=L.divIcon({
      className:'',
      html:`<div class="cond-marker" style="background:${rat.color}">${rat.emoji}</div>`,
      iconSize:[36,36],
      iconAnchor:[18,18],
      popupAnchor:[0,-20],
    });

    const slug=RIVER_SLUGS[r.id];
    const popup=`<div class="pu">
      <div class="pu-type">USGS River Conditions</div>
      <div class="pu-name">${r.name}</div>
      <div class="pu-badge" style="background:${rat.bg};border:1px solid ${rat.color}20">
        <span class="pu-emoji">${rat.emoji}</span>
        <div><div class="pu-label" style="color:${rat.color}">${rat.label}</div>
        <div class="pu-tagline" style="color:${rat.color}">${rat.tagline}</div></div>
      </div>
      ${c?.flow!==null?`<div class="pu-stat">Flow: <strong>${c.flow.toLocaleString()} cfs</strong>${c.flowPct?' ('+c.flowPct+'% of median)':''}</div>`:''}
      ${c?.tempF!==null?`<div class="pu-stat">Water: <strong>${c.tempF}°F</strong> — ${c.tempLabel}</div>`:''}
      <div class="pu-links">
        <a href="https://www.google.com/maps/dir/?api=1&destination=${coords[0]},${coords[1]}" target="_blank" rel="noopener" class="pu-nav">Navigate</a>
        ${slug?`<a href="/stream/${slug}.html" class="pu-link">Stream page</a>`:''}
        <a href="/river.html?id=${r.id}" class="pu-link">All gauges</a>
      </div>
    </div>`;

    const m=L.marker(coords,{icon,zIndexOffset:2000});
    m.bindPopup(popup,{maxWidth:280});
    _riverLayer.addLayer(m);
  });

  _riverLayer.addTo(_map);
}

// ── Access point markers ──────────────────────────────────────────────────────
function accessMarkerColor(pt){
  if(pt.s.includes('brook') && !pt.s.includes('brown')) return SP_COLOR.brook;
  if(pt.s.includes('steelhead')) return SP_COLOR.steelhead;
  if(pt.s.includes('brown')) return SP_COLOR.brown;
  if(pt.s.includes('rainbow')) return SP_COLOR.rainbow;
  return '#888';
}

function matchRiverId(name){
  if(!name)return null;
  const l=name.toLowerCase();
  const map={
    'au sable':'ausable','ausable':'ausable','manistee':'manistee',
    'pere marquette':'pere-marquette','muskegon':'muskegon','boardman':'boardman',
    'jordan river':'jordan','pigeon river':'pigeon','rifle river':'rifle-river',
    'little manistee':'little-manistee','betsie':'betsie-river','pine river':'pine-river',
    'platte':'platte-river','rogue':'rogue-river','brule':'brule-river',
    'sturgeon':'sturgeon-river-nlp','tahquamenon':'tahquamenon-river',
    'black river near bessemer':'black-river-up',
    'paint river':'paint-river','iron river':'iron-river',
    'au train':'au-train-river','miners':'miners-river',
  };
  for(const [k,v] of Object.entries(map)) if(l.includes(k)) return v;
  return null;
}

function renderAccessMarkers(points){
  if(_accessLayer) _map.removeLayer(_accessLayer);

  const filtered = points.filter(p=>{
    if(_activeSp==='all')return true;
    return p.s.includes(_activeSp);
  });

  _accessLayer = L.markerClusterGroup({
    maxClusterRadius:50,
    disableClusteringAtZoom:12,
    iconCreateFunction:cluster=>{
      const n=cluster.getChildCount();
      const sz=n<10?26:n<50?30:34;
      return L.divIcon({
        html:`<div style="background:#2c5f2d;color:#fff;border-radius:50%;width:${sz}px;height:${sz}px;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:Georgia,serif;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)">${n}</div>`,
        className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],
      });
    },
    spiderfyOnMaxZoom:true,
    showCoverageOnHover:false,
  });

  filtered.forEach(pt=>{
    const riverId=matchRiverId(pt.n);
    const cond=riverId?_condMap[riverId]:null;
    // Color by conditions if available, else by primary species
    const color=cond?.conditions?.ratingKey
      ? RATINGS[cond.conditions.ratingKey]?.color||'#888'
      : accessMarkerColor(pt);

    const icon=L.divIcon({
      className:'',
      html:`<div class="access-dot" style="background:${color}"></div>`,
      iconSize:[10,10],iconAnchor:[5,5],
    });

    const spTags=(pt.s||[]).map(s=>`<span class="pu-sp" style="background:${SP_BG[s]||'#eee'};color:${SP_COLOR[s]||'#666'}">${SP_LABEL[s]||s}</span>`).join('');
    const slug=riverId?RIVER_SLUGS[riverId]:null;
    const condHtml=cond?.conditions?.ratingKey ? (()=>{
      const rat=RATINGS[cond.conditions.ratingKey];
      const c2=cond.conditions;
      return `<div class="pu-badge" style="background:${rat.bg};border:1px solid ${rat.color}20">
        <span class="pu-emoji">${rat.emoji}</span>
        <div><div class="pu-label" style="color:${rat.color}">${rat.label}</div>
        <div class="pu-tagline" style="color:${rat.color}">${rat.tagline}</div></div>
      </div>
      ${c2.flow!==null?`<div class="pu-stat">Flow: <strong>${c2.flow.toLocaleString()} cfs</strong></div>`:''}
      ${c2.tempF!==null?`<div class="pu-stat">Water: <strong>${c2.tempF}°F</strong></div>`:''}`;
    })() : '';

    const popup=`<div class="pu">
      <div class="pu-type">DNR Trout Trail · ${pt.c||''}</div>
      <div class="pu-name">${pt.n}</div>
      ${condHtml}
      <div class="pu-species">${spTags}</div>
      ${pt.d?`<div class="pu-desc">${pt.d}</div>`:''}
      ${pt.dir?`<div class="pu-stat" style="margin-top:6px;font-size:11px">📍 ${pt.dir}</div>`:''}
      <div class="pu-links">
        <a href="https://www.google.com/maps/dir/?api=1&destination=${pt.lat},${pt.lon}" target="_blank" rel="noopener" class="pu-nav">Navigate Here</a>
        ${slug?`<a href="/stream/${slug}.html" class="pu-link">Full report</a>`:''}
      </div>
    </div>`;

    const marker=L.marker([pt.lat,pt.lon],{icon});
    marker.bindPopup(popup,{maxWidth:270});
    _accessLayer.addLayer(marker);
  });

  if(_activeLayer==='all') _map.addLayer(_accessLayer);

  // Update sidebar list
  renderSbList(filtered);
  document.getElementById('listHeader').textContent=
    `${filtered.length} access point${filtered.length!==1?'s':''}`;
}

// ── Sidebar list ──────────────────────────────────────────────────────────────
function renderSbList(points){
  const el=document.getElementById('sbList');
  if(!points.length){el.innerHTML='<div style="padding:14px;font-size:12px;color:#bbb;font-style:italic">No points match filter.</div>';return;}
  // Sort by conditions score then name
  const sorted=[...points].sort((a,b)=>{
    const ra=matchRiverId(a.n),rb=matchRiverId(b.n);
    const ca=ra?_condMap[ra]:null,cb=rb?_condMap[rb]:null;
    const sa=ca?(SCORE[ca.conditions?.ratingKey]||0):0;
    const sb=cb?(SCORE[cb.conditions?.ratingKey]||0):0;
    return sb-sa||a.n.localeCompare(b.n);
  });
  el.innerHTML=sorted.slice(0,150).map(pt=>{
    const riverId=matchRiverId(pt.n);
    const cond=riverId?_condMap[riverId]:null;
    const rat=cond?.conditions?.ratingKey?RATINGS[cond.conditions.ratingKey]:null;
    const dots=(pt.s||[]).map(s=>`<span class="sb-dot" style="background:${SP_COLOR[s]||'#ccc'}"></span>`).join('');
    return `<div class="sb-item" onclick="_map.flyTo([${pt.lat},${pt.lon}],13,{duration:0.7})">
      <div class="sb-name">${pt.n}</div>
      <div class="sb-meta">
        <span>${pt.c||''}</span>
        ${rat?`<span style="color:${rat.color};font-weight:bold;font-size:11px">${rat.emoji} ${rat.label}</span>`:''}
        <a href="https://www.google.com/maps/dir/?api=1&destination=${pt.lat},${pt.lon}" target="_blank" rel="noopener" class="sb-nav" onclick="event.stopPropagation()" title="Navigate here">Navigate &rarr;</a>
      </div>
      <div class="sb-dots">${dots}</div>
    </div>`;
  }).join('');
}

// ── Best rivers ───────────────────────────────────────────────────────────────
function renderBest(rivers){
  const top=[...rivers]
    .filter(r=>r.conditions?.ratingKey && RIVER_COORDS[r.id])
    .sort((a,b)=>(SCORE[b.conditions.ratingKey]||0)-(SCORE[a.conditions.ratingKey]||0))
    .slice(0,5);
  const el=document.getElementById('bestList');
  if(!top.length){el.innerHTML='<div style="font-size:11px;color:#bbb;font-style:italic">No data yet.</div>';return;}
  el.innerHTML=top.map(r=>{
    const rat=RATINGS[r.conditions.ratingKey];
    const coords=RIVER_COORDS[r.id];
    const c=r.conditions;
    return `<div class="best-item" onclick="_map.flyTo([${coords[0]},${coords[1]}],11,{duration:0.7})">
      <div>
        <div class="best-name">${r.name}</div>
        <div class="best-sub">${c.flow!==null?c.flow.toLocaleString()+' cfs':''}${c.tempF!==null?' · '+c.tempF+'°F':''}</div>
      </div>
      <span class="best-pill" style="background:${rat.color}">${rat.emoji} ${rat.label}</span>
    </div>`;
  }).join('');
}

// ── Filters ───────────────────────────────────────────────────────────────────
function setSp(v){
  _activeSp=v;
  document.querySelectorAll('[data-sp]').forEach(b=>{b.className='chip'+(b.dataset.sp===v?' on':'');});
  renderAccessMarkers(_allPoints);
}
function setLayer(v){
  _activeLayer=v;
  document.getElementById('layerAll').className='layer-btn'+(v==='all'?' on':'');
  document.getElementById('layerOff').className='layer-btn'+(v==='off'?' on':'');
  if(v==='all' && _accessLayer && !_map.hasLayer(_accessLayer)) _map.addLayer(_accessLayer);
  if(v==='off' && _accessLayer && _map.hasLayer(_accessLayer)) _map.removeLayer(_accessLayer);
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadAll(){
  initMap();
  // Zoom to river or coordinates from URL params
  (function(){
    const p = new URLSearchParams(window.location.search);
    const rid = p.get('river');
    const lat = parseFloat(p.get('lat'));
    const lon = parseFloat(p.get('lon'));
    const z   = parseInt(p.get('z')) || 12;
    if(rid && RIVER_COORDS[rid]){
      _map.setView(RIVER_COORDS[rid], 11);
    } else if(!isNaN(lat) && !isNaN(lon) && (lat !== 0 || lon !== 0)){
      _map.setView([lat, lon], z);
    }
  })();
  try{
    // Load conditions + access points in parallel
    const [condResp, accessResp] = await Promise.all([
      fetch('/api/generate'),
      fetch('/trout-access-points.json'),
    ]);

    // Conditions — render river markers first (fast, high value)
    if(condResp.ok){
      const cd=await condResp.json();
      if(cd.success && cd.rivers){
        cd.rivers.forEach(r=>{_condMap[r.id]=r;});
        renderRiverMarkers(cd.rivers);
        renderBest(cd.rivers);
        document.getElementById('hdrStatus').textContent=
          `${cd.rivers.length} rivers with live data`;
      }
    }

    // Access points — render after conditions so conditions stay on top
    if(accessResp.ok){
      _allPoints=await accessResp.json();
      renderAccessMarkers(_allPoints);
      document.getElementById('hdrStatus').textContent=
        `${Object.keys(_condMap).length} rivers · ${_allPoints.length} access points`;
    }

  }catch(e){
    console.error(e);
    document.getElementById('hdrStatus').textContent='Error loading data';
  }
}

// Mobile sidebar toggle
function toggleSidebar() {
  const sb = document.querySelector('.sidebar');
  const btn = document.querySelector('.mobile-toggle');
  if (sb.classList.contains('open')) {
    sb.classList.remove('open');
    btn.textContent = '📋 Rivers & Access Points';
  } else {
    sb.classList.add('open');
    btn.textContent = '✕ Close List';
  }
}

loadAll();
</script>
