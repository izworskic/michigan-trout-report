<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michigan Trout Stream Map — Access Points, Conditions & Where to Fish</title>
<meta name="description" content="Interactive map of 310+ Michigan trout fishing access points from the DNR Trout Trail, with live USGS stream conditions. Find where to fish today.">
<link rel="canonical" href="https://michigan-trout-report.vercel.app/map.html">
<meta property="og:title" content="Michigan Trout Stream Map — Where to Fish Today">
<meta property="og:description" content="310 DNR-verified access points with live stream conditions. Color-coded by today's fishing conditions.">
<meta property="og:type" content="website">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<!-- MarkerCluster CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: Georgia, 'Times New Roman', serif; }

  /* ── Header ── */
  .site-header {
    background: #1a3a1a;
    color: #f0ede6;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    border-bottom: 2px solid #4a7c4a;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .back-link {
    color: #7ab87a;
    text-decoration: none;
    font-size: 13px;
    white-space: nowrap;
  }
  .back-link:hover { color: #fff; }
  .site-header h1 { font-size: 17px; font-weight: normal; letter-spacing: .5px; }
  .header-right { font-size: 12px; color: #7ab87a; font-style: italic; }

  /* ── Layout: sidebar + map ── */
  .app-layout {
    display: flex;
    height: calc(100vh - 48px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: #faf7f2;
    border-right: 1px solid #ddd8cc;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }

  .sidebar-top {
    padding: 12px 14px 10px;
    border-bottom: 1px solid #e8e4dc;
    background: #fff;
    flex-shrink: 0;
  }

  .best-now-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #4a7c4a;
    margin-bottom: 6px;
  }
  .best-now-title { font-size: 15px; color: #1a3a1a; margin-bottom: 10px; }

  .best-now-list { display: flex; flex-direction: column; gap: 6px; }
  .best-river-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    background: #f5f2ec;
    border-radius: 4px;
    border: 1px solid #e8e4dc;
    cursor: pointer;
    transition: background .12s;
  }
  .best-river-item:hover { background: #ede9e0; }
  .best-river-name { font-size: 13px; color: #1a3a1a; }
  .best-river-sub { font-size: 11px; color: #999; font-style: italic; }
  .best-rating-pill {
    font-size: 11px;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Filters ── */
  .sidebar-filters {
    padding: 10px 14px;
    border-bottom: 1px solid #e8e4dc;
    background: #fff;
    flex-shrink: 0;
  }
  .filter-group { margin-bottom: 8px; }
  .filter-group:last-child { margin-bottom: 0; }
  .filter-group-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #bbb;
    margin-bottom: 5px;
  }
  .filter-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .pill {
    font-family: Georgia, serif;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: #f5f2ec;
    color: #666;
    cursor: pointer;
    transition: all .12s;
  }
  .pill.active-all, .pill.active-brook  { background: #1b5e20; color: #fff; border-color: #1b5e20; }
  .pill.active-brown     { background: #bf360c; color: #fff; border-color: #bf360c; }
  .pill.active-rainbow   { background: #0d47a1; color: #fff; border-color: #0d47a1; }
  .pill.active-steelhead { background: #6a1b9a; color: #fff; border-color: #6a1b9a; }
  .pill.active-cond      { background: #1a3a1a; color: #fff; border-color: #1a3a1a; }
  .pill:hover:not([class*="active"]) { background: #ede9e0; }

  /* ── Access point list ── */
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
  }
  .sidebar-list-header {
    padding: 8px 14px 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #bbb;
    background: #faf7f2;
    border-bottom: 1px solid #f0ece4;
    position: sticky;
    top: 0;
  }
  .access-item {
    padding: 9px 14px;
    border-bottom: 1px solid #f0ece4;
    cursor: pointer;
    transition: background .1s;
  }
  .access-item:hover { background: #f0ece4; }
  .access-item.highlighted { background: #e8f5e9; border-left: 3px solid #2e7d32; }
  .access-name { font-size: 13px; color: #1a3a1a; margin-bottom: 2px; }
  .access-meta { font-size: 11px; color: #aaa; }
  .access-species { display: flex; gap: 3px; margin-top: 3px; }
  .access-species-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  /* ── Map ── */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* ── Custom markers ── */
  .marker-conditions {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2.5px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    cursor: pointer;
  }
  .marker-access {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.8);
    opacity: 0.85;
    cursor: pointer;
  }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper {
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
    font-family: Georgia, serif;
    padding: 0;
  }
  .leaflet-popup-content { margin: 0; font-family: Georgia, serif; }
  .popup-inner { padding: 14px 16px; min-width: 220px; max-width: 280px; }
  .popup-type-badge {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
    margin-bottom: 4px;
  }
  .popup-name { font-size: 15px; color: #1a3a1a; margin-bottom: 4px; }
  .popup-rating {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 10px; border-radius: 4px;
    margin-bottom: 8px;
  }
  .popup-rating-emoji { font-size: 16px; }
  .popup-rating-label { font-size: 13px; font-weight: bold; }
  .popup-rating-tagline { font-size: 11px; opacity: .8; }
  .popup-stat { font-size: 12px; color: #555; margin-bottom: 3px; }
  .popup-species { display: flex; flex-wrap: wrap; gap: 3px; margin: 6px 0; }
  .popup-species-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: .3px;
  }
  .popup-desc {
    font-size: 12px; color: #666; line-height: 1.55;
    margin-top: 8px; border-top: 1px solid #f0ece4; padding-top: 8px;
    max-height: 80px; overflow: hidden;
  }
  .popup-links { margin-top: 10px; display: flex; gap: 8px; }
  .popup-link {
    font-size: 12px; color: #2c5f2d; text-decoration: none;
    border: 1px solid #c8e6c9; padding: 3px 10px; border-radius: 3px;
    background: #e8f5e9;
  }
  .popup-link:hover { background: #c8e6c9; }

  /* ── Legend ── */
  .map-legend {
    background: white;
    padding: 10px 12px;
    border-radius: 5px;
    font-family: Georgia, serif;
    font-size: 12px;
    box-shadow: 0 1px 5px rgba(0,0,0,.2);
    min-width: 160px;
  }
  .map-legend h4 { font-size: 11px; font-weight: normal; text-transform: uppercase; letter-spacing: .8px; color: #aaa; margin-bottom: 7px; }
  .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,.15); }
  .legend-label { color: #444; }

  /* ── Mobile: sidebar slides up ── */
  .sidebar-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: #1a3a1a;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    font-family: Georgia, serif;
    font-size: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
    cursor: pointer;
  }

  @media (max-width: 680px) {
    .app-layout { flex-direction: column-reverse; }
    .sidebar {
      width: 100%;
      height: 45vh;
      border-right: none;
      border-top: 1px solid #ddd8cc;
    }
    #map { height: 55vh; flex: none; }
    .sidebar-toggle { display: block; }
    .site-header h1 { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="site-header">
  <div class="header-left">
    <a href="/" class="back-link">← All Rivers</a>
    <h1>Michigan Trout Map</h1>
  </div>
  <div class="header-right" id="headerStatus">Loading 310 access points...</div>
</div>

<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">

    <!-- Best Rivers Now -->
    <div class="sidebar-top">
      <div class="best-now-label">Right Now</div>
      <div class="best-now-title">Best Conditions</div>
      <div class="best-now-list" id="bestNowList">
        <div style="font-size:12px;color:#bbb;font-style:italic;padding:4px 0">Loading conditions...</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="sidebar-filters">
      <div class="filter-group">
        <div class="filter-group-label">Species</div>
        <div class="filter-pills">
          <button class="pill active-all" data-filter="species" data-value="all" onclick="setSpeciesFilter('all')">All</button>
          <button class="pill" data-filter="species" data-value="brook" onclick="setSpeciesFilter('brook')">Brook</button>
          <button class="pill" data-filter="species" data-value="brown" onclick="setSpeciesFilter('brown')">Brown</button>
          <button class="pill" data-filter="species" data-value="rainbow" onclick="setSpeciesFilter('rainbow')">Rainbow</button>
          <button class="pill" data-filter="species" data-value="steelhead" onclick="setSpeciesFilter('steelhead')">Steelhead</button>
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-group-label">Show</div>
        <div class="filter-pills">
          <button class="pill active-all" data-filter="layer" data-value="all" onclick="setLayerFilter('all')">All Points</button>
          <button class="pill" data-filter="layer" data-value="conditions" onclick="setLayerFilter('conditions')">Rivers w/ Conditions</button>
        </div>
      </div>
    </div>

    <!-- Access Point List -->
    <div class="sidebar-list-header" id="listHeader">Access points</div>
    <div class="sidebar-list" id="accessList"></div>

  </div><!-- /sidebar -->

  <!-- Map -->
  <div id="map"></div>

</div>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

<script>
// ── Constants ────────────────────────────────────────────────────────────────

const RATINGS = {
  PRIME:        { label: 'Prime',        emoji: '🎣', color: '#2e7d32', bg: '#e8f5e9', tagline: 'Drop everything and go.' },
  FISHING_WELL: { label: 'Fishing Well', emoji: '✅', color: '#558b2f', bg: '#f1f8e9', tagline: 'Worth the drive.' },
  FAIR:         { label: 'Fair',         emoji: '🟡', color: '#f9a825', bg: '#fffde7', tagline: 'Fishable. Pick your spots.' },
  TOUGH:        { label: 'Tough',        emoji: '🟠', color: '#e65100', bg: '#fff3e0', tagline: 'Fish are off.' },
  BLOWN_OUT:    { label: 'Blown Out',    emoji: '🔴', color: '#b71c1c', bg: '#ffebee', tagline: 'Stay home.' },
};
const RATING_SCORE = { PRIME: 5, FISHING_WELL: 4, FAIR: 3, TOUGH: 2, BLOWN_OUT: 1 };

const SPECIES_COLORS = {
  brook:     '#1b5e20',
  brown:     '#bf360c',
  rainbow:   '#0d47a1',
  steelhead: '#6a1b9a',
};
const SPECIES_BG = {
  brook:     '#e8f5e9',
  brown:     '#fff3e0',
  rainbow:   '#e3f2fd',
  steelhead: '#f3e5f5',
};
const SPECIES_LABELS = { brook: 'Brook', brown: 'Brown', rainbow: 'Rainbow', steelhead: 'Steelhead' };

// River ID to USGS conditions mapping
let _conditionsMap = {};
let _allAccessPoints = [];
let _activeSpecies = 'all';
let _activeLayer = 'all';
let _accessMarkers = null;
let _riverMarkers = null;
let _map = null;

// River name -> USGS river ID fuzzy match
const RIVER_NAME_MAP = {
  'ausable': 'ausable',
  'au sable': 'ausable',
  'manistee': 'manistee',
  'pere marquette': 'pere-marquette',
  'muskegon': 'muskegon',
  'boardman': 'boardman',
  'jordan': 'jordan',
  'pigeon': 'pigeon',
  'rifle': 'rifle-river',
  'little manistee': 'little-manistee',
  'betsie': 'betsie-river',
  'pine river': 'pine-river',
  'platte': 'platte-river',
  'rogue': 'rogue-river',
  'white river': 'white-river',
  'flat river': 'flat-river',
  'looking glass': 'looking-glass-river',
  'sturgeon': 'sturgeon-river-nlp',
  'thunder bay': 'thunder-bay-river',
  'black river': 'black-river-up',
  'tahquamenon': 'tahquamenon-river',
  'paint river': 'paint-river',
  'iron river': 'iron-river',
  'brule': 'brule-river',
  'au train': 'au-train-river',
  'salmon trout': 'salmon-trout-river',
  'presque isle': 'presque-isle-river',
  'trap rock': 'trap-rock-river',
  'ontonagon': 'ontonagon-river',
  'michigamme': 'michigamme-river',
};

function matchRiverId(name) {
  if (!name) return null;
  const lower = name.toLowerCase();
  for (const [key, val] of Object.entries(RIVER_NAME_MAP)) {
    if (lower.includes(key)) return val;
  }
  return null;
}

// ── Map Init ─────────────────────────────────────────────────────────────────

function initMap() {
  _map = L.map('map', {
    center: [44.8, -85.4],
    zoom: 7,
    zoomControl: true,
  });

  // OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
    maxZoom: 18,
  }).addTo(_map);

  // Legend
  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'map-legend');
    div.innerHTML = `
      <h4>Conditions</h4>
      <div class="legend-row"><div class="legend-dot" style="background:#2e7d32"></div><span class="legend-label">Prime</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:#558b2f"></div><span class="legend-label">Fishing Well</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:#f9a825"></div><span class="legend-label">Fair</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:#e65100"></div><span class="legend-label">Tough</span></div>
      <div class="legend-row"><div class="legend-dot" style="background:#b71c1c"></div><span class="legend-label">Blown Out</span></div>
      <div style="margin-top:8px;padding-top:6px;border-top:1px solid #eee">
        <h4 style="margin-top:0">Access Points</h4>
        <div class="legend-row"><div class="legend-dot" style="background:#1b5e20"></div><span class="legend-label">Brook Trout</span></div>
        <div class="legend-row"><div class="legend-dot" style="background:#bf360c"></div><span class="legend-label">Brown Trout</span></div>
        <div class="legend-row"><div class="legend-dot" style="background:#0d47a1"></div><span class="legend-label">Rainbow</span></div>
        <div class="legend-row"><div class="legend-dot" style="background:#6a1b9a"></div><span class="legend-label">Steelhead</span></div>
      </div>`;
    return div;
  };
  legend.addTo(_map);
}

// ── Marker Creation ──────────────────────────────────────────────────────────

function accessMarkerColor(point) {
  if (point.s.includes('brook') && !point.s.includes('brown')) return SPECIES_COLORS.brook;
  if (point.s.includes('steelhead')) return SPECIES_COLORS.steelhead;
  if (point.s.includes('brown')) return SPECIES_COLORS.brown;
  if (point.s.includes('rainbow')) return SPECIES_COLORS.rainbow;
  return '#888';
}

function makeAccessIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div class="marker-access" style="background:${color}"></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 6],
  });
}

function makeConditionsIcon(color, emoji) {
  return L.divIcon({
    className: '',
    html: `<div class="marker-conditions" style="background:${color}">${emoji}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
  });
}

// ── Popup HTML ───────────────────────────────────────────────────────────────

function accessPointPopup(point, conditions) {
  const speciesTags = (point.s || []).map(s =>
    `<span class="popup-species-tag" style="background:${SPECIES_BG[s]||'#eee'};color:${SPECIES_COLORS[s]||'#666'}">${SPECIES_LABELS[s]||s}</span>`
  ).join('');

  let condHtml = '';
  if (conditions) {
    const rat = RATINGS[conditions.ratingKey] || RATINGS.FAIR;
    const c = conditions;
    condHtml = `
      <div class="popup-rating" style="background:${rat.bg};border:1px solid ${rat.color}20">
        <span class="popup-rating-emoji">${rat.emoji}</span>
        <div>
          <div class="popup-rating-label" style="color:${rat.color}">${rat.label}</div>
          <div class="popup-rating-tagline" style="color:${rat.color}">${rat.tagline}</div>
        </div>
      </div>
      ${c.flow !== null ? `<div class="popup-stat">Flow: <strong>${c.flow.toLocaleString()} cfs</strong> (${c.flowPct || '?'}% of median)</div>` : ''}
      ${c.tempF !== null ? `<div class="popup-stat">Temp: <strong>${c.tempF}°F</strong> — ${c.tempLabel}</div>` : ''}`;
  }

  const riverId = matchRiverId(point.n);
  const fullPageLink = riverId ? `<a href="/river.html?id=${riverId}" class="popup-link">Full report →</a>` : '';

  return `<div class="popup-inner">
    <div class="popup-type-badge">DNR Trout Trail — ${point.c || ''}</div>
    <div class="popup-name">${point.n}</div>
    ${condHtml}
    <div class="popup-species">${speciesTags}</div>
    ${point.d ? `<div class="popup-desc">${point.d}</div>` : ''}
    ${point.dir ? `<div class="popup-stat" style="margin-top:8px;padding-top:8px;border-top:1px solid #f0ece4">📍 ${point.dir}</div>` : ''}
    ${fullPageLink ? `<div class="popup-links">${fullPageLink}</div>` : ''}
  </div>`;
}

function riverConditionsPopup(river) {
  const c = river.conditions;
  const rat = c?.ratingKey ? (RATINGS[c.ratingKey] || RATINGS.FAIR) : null;
  if (!rat) return `<div class="popup-inner"><div class="popup-name">${river.name}</div></div>`;
  return `<div class="popup-inner">
    <div class="popup-type-badge">USGS River Conditions</div>
    <div class="popup-name">${river.name}</div>
    <div class="popup-rating" style="background:${rat.bg};border:1px solid ${rat.color}20">
      <span class="popup-rating-emoji">${rat.emoji}</span>
      <div>
        <div class="popup-rating-label" style="color:${rat.color}">${rat.label}</div>
        <div class="popup-rating-tagline" style="color:${rat.color}">${rat.tagline}</div>
      </div>
    </div>
    ${c.flow !== null ? `<div class="popup-stat">Flow: <strong>${c.flow.toLocaleString()} cfs</strong></div>` : ''}
    ${c.tempF !== null ? `<div class="popup-stat">Water Temp: <strong>${c.tempF}°F</strong> — ${c.tempLabel}</div>` : ''}
    ${c.flowPct ? `<div class="popup-stat">Flow vs. median: <strong>${c.flowPct}%</strong> — ${c.flowLabel}</div>` : ''}
    <div class="popup-links"><a href="/river.html?id=${river.id}" class="popup-link">Full report →</a></div>
  </div>`;
}

// ── Render Markers ───────────────────────────────────────────────────────────

function renderMarkers() {
  // Clear existing
  if (_accessMarkers) _map.removeLayer(_accessMarkers);
  if (_riverMarkers) _map.removeLayer(_riverMarkers);

  const filteredPoints = _allAccessPoints.filter(p => {
    const speciesOk = _activeSpecies === 'all' || p.s.includes(_activeSpecies);
    const layerOk = _activeLayer === 'all' || matchRiverId(p.n) !== null;
    return speciesOk && layerOk;
  });

  // Access point cluster layer
  _accessMarkers = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction: cluster => {
      const count = cluster.getChildCount();
      const size = count < 10 ? 28 : count < 50 ? 34 : 40;
      return L.divIcon({
        html: `<div style="background:#1a3a1a;color:#fff;border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:Georgia,serif;border:2px solid #4a7c4a;box-shadow:0 1px 4px rgba(0,0,0,.3)">${count}</div>`,
        className: '',
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
      });
    },
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
  });

  filteredPoints.forEach(point => {
    const riverId = matchRiverId(point.n);
    const conditions = riverId ? _conditionsMap[riverId] : null;
    const color = conditions
      ? (RATINGS[conditions.ratingKey]?.color || '#888')
      : accessMarkerColor(point);
    const icon = makeAccessIcon(color);
    const marker = L.marker([point.lat, point.lon], { icon });
    marker.bindPopup(accessPointPopup(point, conditions), { maxWidth: 300 });
    _accessMarkers.addLayer(marker);
  });

  _map.addLayer(_accessMarkers);

  // River conditions layer — larger markers for gauged rivers
  _riverMarkers = L.layerGroup();
  const riverCoords = {
    'ausable':          [44.655, -84.132],
    'manistee':         [44.580, -85.760],
    'pere-marquette':   [43.955, -86.230],
    'muskegon':         [43.398, -85.842],
    'boardman':         [44.789, -85.647],
    'jordan':           [45.159, -85.077],
    'pigeon':           [45.052, -84.569],
    'rifle-river':      [44.016, -84.026],
    'little-manistee':  [43.968, -86.189],
    'betsie-river':     [44.612, -86.062],
    'pine-river':       [44.210, -85.952],
    'platte-river':     [44.676, -86.148],
    'rogue-river':      [43.118, -85.541],
    'white-river':      [43.703, -86.362],
    'flat-river':       [43.047, -85.299],
    'looking-glass-river': [42.850, -84.813],
    'sturgeon-river-nlp': [45.278, -84.681],
    'thunder-bay-river': [45.070, -83.753],
    'black-river-up':   [46.619, -90.068],
    'tahquamenon-river': [46.537, -85.262],
    'paint-river':      [46.106, -88.309],
    'iron-river':       [46.094, -88.672],
    'brule-river':      [46.085, -88.452],
    'au-train-river':   [46.462, -86.763],
    'ontonagon-river':  [46.771, -89.306],
    'presque-isle-river': [46.691, -89.963],
    'sturgeon-river-up':  [46.529, -89.097],
    'salmon-trout-river': [46.826, -87.948],
    'trap-rock-river':  [47.148, -88.386],
    'michigamme-river': [46.018, -88.298],
    'au-gres-river':    [44.032, -83.682],
    'pine-river-midland': [43.617, -84.261],
  };

  const riverList = Object.values(_conditionsMap);
  riverList.forEach(river => {
    const coords = riverCoords[river.id];
    if (!coords || !river.conditions?.ratingKey) return;
    const rat = RATINGS[river.conditions.ratingKey];
    if (!rat) return;
    const icon = makeConditionsIcon(rat.color, rat.emoji);
    const marker = L.marker(coords, { icon, zIndexOffset: 1000 });
    marker.bindPopup(riverConditionsPopup(river), { maxWidth: 300 });
    _riverMarkers.addLayer(marker);
  });

  _riverMarkers.addTo(_map);

  // Update list
  renderSidebarList(filteredPoints);
  document.getElementById('listHeader').textContent =
    `${filteredPoints.length} access point${filteredPoints.length !== 1 ? 's' : ''}`;
}

// ── Sidebar List ─────────────────────────────────────────────────────────────

function renderSidebarList(points) {
  const list = document.getElementById('accessList');
  if (!points.length) {
    list.innerHTML = '<div style="padding:16px 14px;font-size:13px;color:#bbb;font-style:italic">No points match the current filters.</div>';
    return;
  }

  // Sort: rivers with conditions first (by score), then alphabetical
  const sorted = [...points].sort((a, b) => {
    const ra = matchRiverId(a.n);
    const rb = matchRiverId(b.n);
    const ca = ra ? _conditionsMap[ra] : null;
    const cb = rb ? _conditionsMap[rb] : null;
    const sa = ca ? (RATING_SCORE[ca.conditions?.ratingKey] || 0) : 0;
    const sb = cb ? (RATING_SCORE[cb.conditions?.ratingKey] || 0) : 0;
    if (sa !== sb) return sb - sa;
    return a.n.localeCompare(b.n);
  });

  list.innerHTML = sorted.slice(0, 200).map(point => {
    const speciesDots = (point.s || []).map(s =>
      `<div class="access-species-dot" style="background:${SPECIES_COLORS[s]||'#ccc'}"></div>`
    ).join('');
    const riverId = matchRiverId(point.n);
    const cond = riverId ? _conditionsMap[riverId] : null;
    const rat = cond?.conditions?.ratingKey ? RATINGS[cond.conditions.ratingKey] : null;
    const condBadge = rat ? `<span class="best-rating-pill" style="background:${rat.color};color:#fff">${rat.emoji} ${rat.label}</span>` : '';
    return `<div class="access-item" onclick="flyToPoint(${point.lat},${point.lon},'${point.n.replace(/'/g,"\\'")}')">
      <div class="access-name">${point.n}</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="access-meta">${point.c || ''}</div>
        ${condBadge}
      </div>
      <div class="access-species">${speciesDots}</div>
    </div>`;
  }).join('');
}

function flyToPoint(lat, lon, name) {
  _map.flyTo([lat, lon], 13, { duration: 0.8 });
}

// ── Best Rivers Now ───────────────────────────────────────────────────────────

function renderBestNow(rivers) {
  const scored = rivers
    .filter(r => r.conditions?.ratingKey)
    .map(r => ({ ...r, score: RATING_SCORE[r.conditions.ratingKey] || 0 }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);

  const container = document.getElementById('bestNowList');
  if (!scored.length) {
    container.innerHTML = '<div style="font-size:12px;color:#bbb;font-style:italic">No conditions data available.</div>';
    return;
  }

  container.innerHTML = scored.map(river => {
    const rat = RATINGS[river.conditions.ratingKey];
    const coords = getRiverCoords(river.id);
    const onclick = coords ? `flyToRiver('${river.id}',${coords[0]},${coords[1]})` : '';
    return `<div class="best-river-item" onclick="${onclick}">
      <div>
        <div class="best-river-name">${river.name}</div>
        <div class="best-river-sub">${river.conditions.tempF ? river.conditions.tempF + '°F' : ''} ${river.conditions.flow ? '· ' + river.conditions.flow.toLocaleString() + ' cfs' : ''}</div>
      </div>
      <span class="best-rating-pill" style="background:${rat.color};color:#fff">${rat.emoji} ${rat.label}</span>
    </div>`;
  }).join('');
}

function getRiverCoords(id) {
  const coords = {
    'ausable': [44.655, -84.132], 'manistee': [44.580, -85.760],
    'pere-marquette': [43.955, -86.230], 'muskegon': [43.398, -85.842],
    'boardman': [44.789, -85.647], 'jordan': [45.159, -85.077],
    'pigeon': [45.052, -84.569], 'rifle-river': [44.016, -84.026],
    'little-manistee': [43.968, -86.189], 'betsie-river': [44.612, -86.062],
    'pine-river': [44.210, -85.952], 'platte-river': [44.676, -86.148],
    'rogue-river': [43.118, -85.541], 'looking-glass-river': [42.850, -84.813],
    'sturgeon-river-nlp': [45.278, -84.681], 'tahquamenon-river': [46.537, -85.262],
  };
  return coords[id] || null;
}

function flyToRiver(id, lat, lon) {
  _map.flyTo([lat, lon], 11, { duration: 0.9 });
}

// ── Filters ──────────────────────────────────────────────────────────────────

function setSpeciesFilter(value) {
  _activeSpecies = value;
  document.querySelectorAll('[data-filter="species"]').forEach(el => {
    el.className = 'pill' + (el.dataset.value === value ? ` active-${value}` : '');
  });
  renderMarkers();
}

function setLayerFilter(value) {
  _activeLayer = value;
  document.querySelectorAll('[data-filter="layer"]').forEach(el => {
    el.className = 'pill' + (el.dataset.value === value ? ' active-cond' : '');
  });
  renderMarkers();
}

// ── Load Data ─────────────────────────────────────────────────────────────────

async function loadAll() {
  initMap();

  try {
    // Load both in parallel
    const [accessResp, condResp] = await Promise.all([
      fetch('/trout-access-points.json'),
      fetch('/api/generate'),
    ]);

    // Access points
    _allAccessPoints = await accessResp.json();
    document.getElementById('headerStatus').textContent =
      `${_allAccessPoints.length} DNR access points`;

    // Conditions
    if (condResp.ok) {
      const condData = await condResp.json();
      if (condData.success && condData.rivers) {
        condData.rivers.forEach(r => { _conditionsMap[r.id] = r; });
        renderBestNow(condData.rivers);
        document.getElementById('headerStatus').textContent =
          `${_allAccessPoints.length} access points · ${condData.rivers.length} rivers with live conditions`;
      }
    }

    renderMarkers();

  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('headerStatus').textContent = 'Error loading data';
  }
}

loadAll();
</script>
